# Production overrides. Used on EC2 only.
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# Postgres → Supabase cloud. Qdrant → Qdrant Cloud. Only Redis + Kafka run locally.

services:
  redis:
    restart: always
    ports: []  # Not exposed to host — app connects over internal network

  kafka:
    restart: always
    environment:
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INT://kafka:29092

  kafka-ui:
    restart: always
    ports: []  # Access via SSH tunnel: ssh -L 8080:localhost:8080 ec2-user@<host>

  clip-service:
    restart: always
    ports: []  # Internal only — app calls http://clip-service:8001

  personalisation-worker:
    restart: always

  post-purchase-worker:
    restart: always
