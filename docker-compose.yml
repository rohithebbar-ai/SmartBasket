services:
  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  clip-service:
    build:
      context: deploy/hf_spaces/clip
      dockerfile: Dockerfile.local
    ports:
      - "8001:8001"
    environment:
      - CLIP_SERVICE_API_KEY=${CLIP_SERVICE_API_KEY:-}
      # Mount HuggingFace cache so ViT-B-32 weights (~350MB) are downloaded once
      # and reused on every restart instead of re-downloading each time.
      - HF_HOME=/cache/huggingface
    volumes:
      - clip_model_cache:/cache
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8001/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

  # KRaft mode — no ZooKeeper needed.
  # The broker acts as both broker and controller (combined mode, fine for dev).
  # CLUSTER_ID is a fixed 22-char base64url string — must stay constant across
  # restarts so the on-disk metadata matches. Changing it requires wiping kafka_data.
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      # PLAINTEXT     → external clients (localhost:9092)
      # PLAINTEXT_INT → inter-broker traffic inside Docker network (kafka:29092)
      # CONTROLLER    → KRaft Raft consensus (kafka:9093, internal only)
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_INT://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INT://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      # Fixed cluster ID — generated once, never changes.
      # To regenerate: docker run --rm confluentinc/cp-kafka:7.6.0 kafka-storage random-uuid
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qg
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 > /dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 20s

  # Runs once after Kafka is healthy, creates all 6 topics, then exits.
  kafka-init:
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command: |
      "kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic product.viewed   --partitions 3 --replication-factor 1 &&
       kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic product.created  --partitions 3 --replication-factor 1 &&
       kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic cart.updated     --partitions 3 --replication-factor 1 &&
       kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic order.created    --partitions 3 --replication-factor 1 &&
       kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic order.delivered  --partitions 3 --replication-factor 1 &&
       kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic price.updated    --partitions 3 --replication-factor 1 &&
       echo 'All topics created.'"
    restart: "no"

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: shopsense
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health | grep -q UP || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Background worker processes ───────────────────────────────────────────────
  # Both run in their own containers, separate from the FastAPI web process, so
  # they never block HTTP request handling.
  # Postgres is on Supabase (cloud) — no local postgres dependency.

  personalisation-worker:
    build: .
    command: python -m workers.run_workers
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    volumes:
      - ".:/app"
    restart: on-failure

  post-purchase-worker:
    build: .
    command: >
      python -c "
      import asyncio;
      from workers.scheduled_agents.post_purchase import run_post_purchase_worker;
      asyncio.run(run_post_purchase_worker())"
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    volumes:
      - ".:/app"
    restart: on-failure

volumes:
  redis_data:
  kafka_data:
  clip_model_cache:  # persists ViT-B-32 weights across container restarts
