# Automatically merged by Docker Compose during local development.
# Adds: verbose logging, isolated test database.
# Never used in production — copy docker-compose.prod.yml to EC2 instead.

services:
  redis:
    command: redis-server --loglevel verbose

  kafka:
    environment:
      KAFKA_LOG4J_LOGGERS: "kafka=WARN,kafka.controller=WARN"

  # Isolated test database — in-memory postgres for pytest only (port 5433).
  # Uses tmpfs for speed; data is lost on container restart by design.
  postgres_test:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: shopsense_test
      POSTGRES_PASSWORD: shopsense_test
      POSTGRES_DB: shopsense_test
    ports:
      - "5433:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shopsense_test"]
      interval: 5s
      timeout: 5s
      retries: 5
